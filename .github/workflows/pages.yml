# Publish the static UI (web/) to GitHub Pages at the custom domain, talking to the
# Cloudflare Worker API. git push = deploy. The DNS (CNAME at your registrar) is the
# only manual, one-time step: web-builder.thingino.com -> thingino.github.io.
name: pages
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Point the UI at the Worker + set the custom domain
        run: |
          echo "window.API_BASE='https://thingino-web-builder.gtxent.workers.dev';" > web/config.js
          echo "web-builder.thingino.com" > web/CNAME
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: web
      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
