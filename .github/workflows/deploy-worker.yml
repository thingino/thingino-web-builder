# Auto-deploy the Cloudflare Worker on push (git push = deploy). Requires two repo
# secrets: CLOUDFLARE_API_TOKEN (Workers Scripts:Edit + D1:Edit) and
# CLOUDFLARE_ACCOUNT_ID. The Worker's own GITHUB_TOKEN is a Cloudflare secret
# (wrangler secret put) and persists across deploys — it is NOT stored here.
name: deploy-worker
on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: npx --yes wrangler deploy --var VERSION:"v0.1.0-$(git rev-parse --short HEAD)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
