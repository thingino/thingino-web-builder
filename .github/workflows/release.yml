# Build the broker image and publish it to ghcr.io so VPS deploys can pull it
# (instead of building on the box) and self-update.
#   - push a tag v* -> :latest + :vX.Y.Z + a GitHub Release
#   - run manually   -> :edge (for testing)
name: release-image
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release on a tag
      packages: write   # push to ghcr
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve tags + version
        id: meta
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "tags=${IMAGE}:${GITHUB_REF_NAME},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=edge" >> "$GITHUB_OUTPUT"
            echo "tags=${IMAGE}:edge" >> "$GITHUB_OUTPUT"
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BUILD_SHA=${{ steps.meta.outputs.version }}

      - name: Create GitHub Release
        if: steps.meta.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES="Container image: \`${IMAGE}:${GITHUB_REF_NAME}\` (also \`${IMAGE}:latest\`)."
          gh release create "$GITHUB_REF_NAME" --repo "${{ github.repository }}" --title "$GITHUB_REF_NAME" --notes "$NOTES" \
            || gh release edit "$GITHUB_REF_NAME" --repo "${{ github.repository }}" --notes "$NOTES"
