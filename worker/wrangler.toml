name = "thingino-web-builder"
main = "src/index.js"
compatibility_date = "2025-06-01"

# Scheduler + reaper run on a cron (Cloudflare's minimum interval is 1 minute).
[triggers]
crons = ["* * * * *"]

# D1 (SQLite at the edge). Create it with `wrangler d1 create thingino-builder`
# and paste the printed database_id here.
[[d1_databases]]
binding = "DB"
database_name = "thingino-builder"
database_id = "5e72dc96-8856-4418-b59f-d872bca8330f"

[vars]
VERSION = "v0.1.0"
GITHUB_REPO = "thingino/thingino-web-builder"
THINGINO_REPO = "themactep/thingino-firmware"
THINGINO_REF = "master"
ROLLING_TAG = "web-builds"
PER_USER_HOURLY_LIMIT = "2"
PER_IP_HOURLY_LIMIT = "3"
GLOBAL_HOURLY_LIMIT = "20"
MAX_CONCURRENT_BUILDS = "6"
MAX_QUEUE = "50"
RETENTION_SECS = "1800"
FAILED_RETENTION_SECS = "3600"
BUILD_TIMEOUT_SECS = "5400"
# Origin(s) allowed to call this Worker from a browser. The UI is hosted on GitHub
# Pages (a different origin), so CORS is required. "*" is fine here: the API is
# rate-limited and admin needs a session token, so cross-origin calls gain nothing.
ALLOW_ORIGIN = "*"

# GitHub App (optional). With all three present, builds dispatch via a short-lived
# App installation token, so runs are attributed to the App/bot — not a personal
# PAT. Omit to fall back to the static GITHUB_TOKEN PAT (dual-mode).
GITHUB_APP_ID = "4180528"
GITHUB_APP_INSTALLATION_ID = "143466507"

# Secrets (NOT vars) — set with `wrangler secret put <NAME>`:
#   GITHUB_APP_PRIVATE_KEY   the App private key as PKCS#8 PEM (App auth), and/or
#   GITHUB_TOKEN             a fine-grained PAT (Contents R/W + Actions R/W) fallback
