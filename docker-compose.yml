# Thingino web-builder — VPS deployment.
#   1. cp .env.example .env   (or run ./setup.sh to also generate admin creds)
#   2. edit .env: DOMAIN, GITHUB_REPO, GITHUB_TOKEN
#   3. docker compose up -d --build
# Caddy terminates TLS (auto Let's Encrypt for DOMAIN, or your own certs in ./certs).
services:
  broker:
    build: .
    restart: unless-stopped
    env_file: .env            # GITHUB_TOKEN, GITHUB_REPO, ADMIN_TOKEN, ADMIN_TOTP_SECRET, tuning…
    environment:
      IP_HEADER: "X-Real-IP"  # Caddy sets this to the true client; used for per-IP limits
    volumes:
      - broker-data:/data     # SQLite db + lock/pid persist here
    expose:
      - "8080"                # internal only; Caddy is the public entrypoint

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [broker]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro     # optional: drop cert.pem + key.pem here for BYO certs
      - caddy-data:/data      # auto-provisioned certs persist here
      - caddy-config:/config

volumes:
  broker-data:
  caddy-data:
  caddy-config:
