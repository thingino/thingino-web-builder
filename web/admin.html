<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>thingino · Builder Admin</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link href="/vendor/bootstrap.min.css" rel="stylesheet">
  <link href="/vendor/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/vendor/montserrat.css" rel="stylesheet">
  <style>
    :root { --bs-font-sans-serif:"Montserrat",sans-serif; }
    body { min-height:100vh; background:#0d1117; }
    .card-title { color:darkorange !important; }
    code { color:darkorange; font-size:.85em; }
    .btn-thingino { background:#ff8c00; border-color:#ff8c00; color:#0d1117; font-weight:600; }
    .btn-thingino:hover, .btn-thingino:focus { background:#ff9e2c; border-color:#ff9e2c; color:#0d1117; }
    .muted { color:#8b949e !important; }
    .table > :not(caption) > * > * { background:transparent; }
    th { color:#8b949e; font-weight:600; white-space:nowrap; }
    td { white-space:nowrap; vertical-align:middle; }
  </style>
</head>
<body class="p-3">

<div id="gate" style="max-width:420px;margin:8vh auto 0;">
  <div class="card">
    <div class="card-header"><h2 class="card-title mb-0 fs-5"><i class="bi bi-shield-lock me-1"></i> Admin</h2></div>
    <div class="card-body">
      <p class="small muted">Enter the admin token and your 6-digit authenticator code.</p>
      <input id="token" type="password" class="form-control mb-2" placeholder="Admin token" autocomplete="off">
      <input id="totp" type="text" class="form-control mb-2" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="6-digit code" autocomplete="off" required>
      <button id="login" class="btn btn-thingino w-100">Sign in</button>
      <div class="text-danger small mt-2" id="gate-err"></div>
    </div>
  </div>
</div>

<div id="app" style="display:none;max-width:980px;margin:0 auto;">
  <div class="d-flex align-items-center mb-3 flex-wrap gap-2">
    <h1 class="fs-4 mb-0"><i class="bi bi-shield-lock me-1" style="color:darkorange"></i> Thingino Builder — Admin</h1>
    <span class="ms-auto small muted" id="updated"></span>
    <button class="btn btn-outline-secondary btn-sm" id="logout">Sign out</button>
  </div>

  <div class="card mb-3"><div class="card-body d-flex align-items-center gap-3 flex-wrap">
    <div>Builds are <span id="kill-state" class="fw-bold">…</span></div>
    <button id="kill-btn" class="btn btn-sm">…</button>
    <span class="small muted ms-auto" id="kill-extra"></span>
  </div></div>

  <div class="card mb-3"><div class="card-body d-flex align-items-center gap-3 flex-wrap">
    <div>Version <code id="ver">…</code> <span id="upd-badge"></span></div>
    <button id="upd-btn" class="btn btn-sm btn-thingino" style="display:none">Update now</button>
    <span class="small muted ms-auto" id="upd-extra"></span>
  </div></div>

  <div class="row g-2 mb-3" id="tiles"></div>

  <div class="card mb-3">
    <div class="card-header"><h2 class="card-title fs-6 mb-0"><i class="bi bi-list-ul me-1"></i> Recent builds</h2></div>
    <div class="card-body p-0"><div class="table-responsive" style="max-height:320px;overflow:auto;">
      <table class="table table-sm table-dark mb-0 small"><thead><tr>
        <th>build</th><th>defconfig</th><th>state</th><th>user</th><th>ip</th><th>created</th><th>duration</th><th>run</th>
      </tr></thead><tbody id="builds-body"></tbody></table>
    </div></div>
  </div>

  <div class="card">
    <div class="card-header"><h2 class="card-title fs-6 mb-0"><i class="bi bi-journal-text me-1"></i> Recent events</h2></div>
    <div class="card-body p-0"><div class="table-responsive" style="max-height:320px;overflow:auto;">
      <table class="table table-sm table-dark mb-0 small"><thead><tr>
        <th>time</th><th>kind</th><th>build</th><th>user</th><th>ip</th><th>detail</th>
      </tr></thead><tbody id="events-body"></tbody></table>
    </div></div>
  </div>
</div>

<script src="/vendor/bootstrap.bundle.min.js"></script>
<script>
const TK='thingino_admin_token';
const tok=()=>sessionStorage.getItem(TK)||'';
const $=id=>document.getElementById(id);
const short=s=>s?String(s).slice(0,8):'';
const tfmt=ts=>new Date(ts*1000).toLocaleTimeString();
const dur=(a,b)=>{ if(!a||!b) return '—'; const s=b-a; return `${Math.floor(s/60)}m${String(s%60).padStart(2,'0')}s`; };
const ago=ts=>{ const s=Math.floor(Date.now()/1000)-ts; if(s<60)return s+'s ago'; if(s<3600)return Math.floor(s/60)+'m ago'; return Math.floor(s/3600)+'h ago'; };
const PILL={queued:'bg-info text-dark',running:'bg-primary',cancelling:'bg-warning text-dark',done:'bg-success',failed:'bg-danger',cancelled:'bg-secondary',expired:'bg-dark border'};
const pill=s=>`<span class="badge ${PILL[s]||'bg-secondary'}">${s}</span>`;
const tile=(l,n)=>`<div class="col-6 col-md-3 col-lg-2"><div class="card text-center h-100"><div class="card-body py-2 px-1"><div class="fs-4 fw-bold">${n??0}</div><div class="small muted text-uppercase">${l}</div></div></div></div>`;

async function adminGet(){ const r=await fetch('/api/admin/stats',{headers:{Authorization:'Bearer '+tok()}}); if(r.status===401) throw 0; return r.json(); }
async function login(){
  $('gate-err').textContent='';
  const r=await fetch('/api/admin/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({token:$('token').value.trim(),totp:$('totp').value.trim()})});
  const d=await r.json().catch(()=>({}));
  if(r.ok&&d.session){ sessionStorage.setItem(TK,d.session); show(); }
  else { $('gate-err').textContent=d.error||'Invalid credentials.'; sessionStorage.removeItem(TK); }
}
function show(){ $('gate').style.display='none'; $('app').style.display=''; refresh(); }
function logout(){ sessionStorage.removeItem(TK); location.reload(); }

let enabled=true;
async function refresh(){
  let d; try{ d=await adminGet(); }catch{ logout(); return; }
  enabled=d.builds_enabled;
  $('kill-state').innerHTML=enabled?'<span class="text-success">ENABLED</span>':'<span class="text-danger">DISABLED</span>';
  const kb=$('kill-btn'); kb.textContent=enabled?'Disable builds':'Enable builds'; kb.className='btn btn-sm '+(enabled?'btn-outline-danger':'btn-thingino');
  $('kill-extra').textContent=`cap ${d.max_concurrent} concurrent · retention ${Math.round(d.retention_secs/60)} min`;
  $('ver').textContent=d.version||'—';
  if(d.update_available){
    $('upd-badge').innerHTML='<span class="badge text-bg-warning ms-1">update available → '+(d.latest_version||'')+'</span>';
    $('upd-btn').style.display=''; $('upd-btn').dataset.v=d.latest_version||'';
  } else {
    $('upd-badge').innerHTML=d.latest_version?'<span class="text-success small ms-1">up to date</span>':'';
    $('upd-btn').style.display='none';
  }
  const c=d.counts||{};
  $('tiles').innerHTML=[['running',c.running],['queued',c.queued],['done',c.done],['failed',c.failed],['cancelled',c.cancelled],['expired',c.expired],['24h',d.last24h],['avg build',d.avg_build_secs?Math.round(d.avg_build_secs/60)+'m':'—']].map(([l,n])=>tile(l,n)).join('');
  $('builds-body').innerHTML=(d.recent_builds||[]).map(b=>`<tr><td><code>${short(b.build_id)}</code></td><td>${b.defconfig}</td><td>${pill(b.state)}</td><td><code>${short(b.uid)}</code></td><td><code>${b.ip||''}</code></td><td>${ago(b.created_ts)}</td><td>${dur(b.dispatched_ts,b.finished_ts)}</td><td><code>${b.run_id||''}</code></td></tr>`).join('');
  $('events-body').innerHTML=(d.recent_events||[]).map(e=>`<tr><td>${tfmt(e.ts)}</td><td>${e.kind}</td><td><code>${short(e.build_id)}</code></td><td><code>${short(e.uid)}</code></td><td><code>${e.ip||''}</code></td><td class="muted">${(e.detail||'').replace(/</g,'&lt;')}</td></tr>`).join('');
  $('updated').textContent='updated '+new Date().toLocaleTimeString();
}
async function toggle(){ await fetch('/api/admin/toggle',{method:'POST',headers:{Authorization:'Bearer '+tok(),'content-type':'application/json'},body:JSON.stringify({enabled:!enabled})}); refresh(); }
async function doUpdate(){
  const v=$('upd-btn').dataset.v||'';
  if(!confirm('Update the builder'+(v?' to '+v:'')+' and restart? In-progress builds keep running on GitHub.')) return;
  $('upd-btn').disabled=true; $('upd-extra').textContent='requesting update…';
  try{ const r=await fetch('/api/admin/update',{method:'POST',headers:{Authorization:'Bearer '+tok()}}); const j=await r.json().catch(()=>({})); $('upd-extra').textContent=r.ok?(j.status||'update requested'):(j.error||'update failed'); }
  catch{ $('upd-extra').textContent='update failed'; }
  $('upd-btn').disabled=false;
}

$('login').onclick=login;
$('token').addEventListener('keydown',e=>{ if(e.key==='Enter') $('totp').focus(); });
$('totp').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
$('logout').onclick=logout;
$('kill-btn').onclick=toggle;
$('upd-btn').onclick=doUpdate;
if(tok()){ adminGet().then(show).catch(()=>sessionStorage.removeItem(TK)); }
setInterval(()=>{ if($('app').style.display!=='none') refresh(); },5000);
</script>
</body>
</html>
